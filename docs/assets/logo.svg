<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Zoom Out logo">
  <!-- Clay-style mark: chunky rounded zoom-out brackets stepping inward
       to a hot-pink screen. Flat saturated fills, generous radii. -->

  <!-- outer brackets: widest zoom level — lavender -->
  <g stroke="#b8a4ed" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M30 10 H18 a8 8 0 0 0 -8 8 V30"/>
    <path d="M98 10 H110 a8 8 0 0 1 8 8 V30"/>
    <path d="M30 118 H18 a8 8 0 0 1 -8 -8 V98"/>
    <path d="M98 118 H110 a8 8 0 0 0 8 -8 V98"/>
  </g>

  <!-- middle brackets — peach -->
  <g stroke="#ffb084" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M42 28 H36 a8 8 0 0 0 -8 8 V42"/>
    <path d="M86 28 H92 a8 8 0 0 1 8 8 V42"/>
    <path d="M42 100 H36 a8 8 0 0 1 -8 -8 V86"/>
    <path d="M86 100 H92 a8 8 0 0 0 8 -8 V86"/>
  </g>

  <!-- the screen: hot-pink widescreen frame -->
  <rect x="36" y="45" width="56" height="38" rx="12" fill="#ff4d8b"/>

  <!-- recursive screen-within-screen: the zoom continues inward -->
  <rect x="48" y="54" width="32" height="20" rx="7" fill="#fffaf0"/>
  <rect x="58" y="60" width="12" height="8" rx="3.5" fill="#ff4d8b"/>
</svg>
